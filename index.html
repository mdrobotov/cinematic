<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Автоматизация кинотеатра</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Автоматизация кинотеатра</h1>
        <div class="menu">
            <button data-table="Movies">Фильмы</button>
            <button data-table="Halls">Залы</button>
            <button data-table="Seats">Места</button>
            <button data-table="Clients">Клиенты</button>
            <button data-table="Sessions">Сеансы</button>
            <button data-table="Tickets">Билеты</button>
        </div>
        <div id="content">
            <!-- Здесь будет таблица -->
        </div>

        <!-- Модальное окно -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
